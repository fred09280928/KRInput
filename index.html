<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Korean Typing Practice · Dubeolsik</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #2b3a4a 0%, #1d2a35 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255,255,255,0.3);
            padding: 24px 20px 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e2a36;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 24px;
            color: white;
            font-weight: 600;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 4px 8px rgba(0,0,0,0.2);
        }

        .score-box {
            background: #ffd966;
            color: #1e2a36;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1.4rem;
            letter-spacing: 1px;
            box-shadow: 0 2px 0 #b38f40;
        }

        .mode-badge {
            background: #3a4c5e;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mode-badge span {
            color: #a3c6e9;
        }

        .character-area {
            background: #eef3f7;
            border-radius: 100px;
            margin: 10px 0 20px;
            padding: 30px 10px;
            text-align: center;
            box-shadow: inset 0 8px 12px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.15);
            border: 3px solid white;
            position: relative;
        }

        .korean-char {
            font-size: min(25vw, 10rem);
            font-weight: 800;
            line-height: 1;
            color: #1f3a4b;
            text-shadow: 3px 3px 0 #c9dae8;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-hint {
            font-size: 1.2rem;
            color: #4a627a;
            margin-top: 8px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .input-hint.hidden {
            opacity: 0;
            visibility: hidden;
            height: 0;
            margin: 0;
        }

        /* Play button for manual sound */
        .play-button {
            position: absolute;
            bottom: -20px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ffd966;
            border: 4px solid white;
            box-shadow: 0 6px 0 #b38f40, 0 8px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.05s linear;
            z-index: 10;
        }

        .play-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b38f40, 0 8px 15px rgba(0,0,0,0.2);
        }

        .play-button span {
            transform: scale(1.2);
            display: inline-block;
        }

        /* Control bar for hint and sound toggles */
        .control-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin: 25px 0 15px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #d9e2ec;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e2a36;
            border: 1px solid white;
        }

        .toggle-container input[type="checkbox"] {
            width: 44px;
            height: 24px;
            appearance: none;
            background: #95a5a6;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            border: 2px solid white;
            transition: 0.1s;
        }

        .toggle-container input[type="checkbox"]:checked {
            background: #2e7d32;
        }

        .toggle-container input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 0px;
            left: 0px;
            transition: 0.1s;
        }

        .toggle-container input[type="checkbox"]:checked::before {
            left: 20px;
        }

        .keyboard-container {
            background: #d9e2ec;
            border-radius: 30px;
            padding: 20px 12px 15px;
            margin: 10px 0 20px;
            border: 2px solid white;
        }

        /* QWERTY layout rows */
        .key-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .key {
            background: white;
            border-radius: 16px;
            padding: 8px 0;
            min-width: 44px;
            text-align: center;
            font-weight: 700;
            box-shadow: 0 4px 0 #b0bec5, 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #f0f4fa;
            flex: 0 1 auto;
            transition: all 0.05s ease;
            cursor: pointer;
        }

        .key.active {
            background: #f5e56b;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b0bec5;
        }

        .key .korean {
            display: block;
            font-size: 1.3rem;
            color: #0f2a3b;
        }

        .key .roman {
            display: block;
            font-size: 0.7rem;
            color: #5c6f82;
            font-weight: 400;
        }

        .key .eng {
            display: block;
            font-size: 0.7rem;
            color: #aa00aa;
            font-weight: 600;
            text-transform: uppercase;
        }

        .key.vowel .korean {
            color: #b13e3e;
        }

        .feedback-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0 15px;
            gap: 10px;
        }

        .message {
            background: #273a4b;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            flex: 1;
            font-size: 1rem;
            border-left: 6px solid #ffd966;
        }

        .footer-note {
            text-align: center;
            color: #6c8aa3;
            margin-top: 20px;
            font-size: 0.8rem;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stats-bar">
            <div class="score-box" id="scoreDisplay">0</div>
            <div class="mode-badge">
                <span>✧</span> 두벌식 · mixed <span>✧</span>
            </div>
        </div>

        <div class="character-area">
            <div class="korean-char" id="currentChar">ㅏ</div>
            <div class="input-hint" id="hintText">a · press "K"</div>
            <!-- Manual play button -->
            <div class="play-button" id="playButton" title="Pronounce this letter">
                <span>🔊</span>
            </div>
        </div>

        <!-- Control bar with hint and autoplay sound toggles -->
        <div class="control-bar">
            <div class="toggle-container">
                <span>🔤 Show hint</span>
                <input type="checkbox" id="hintToggle" checked>
            </div>
            <div class="toggle-container">
                <span>🔊 AutoPlay Sound</span>
                <input type="checkbox" id="autoPlayToggle" checked>
            </div>
        </div>

        <!-- Keyboard in QWERTY layout -->
        <div class="keyboard-container">
            <!-- Row 1: Q W E R T Y U I O P -->
            <div class="key-row" id="row1"></div>
            <!-- Row 2: A S D F G H J K L -->
            <div class="key-row" id="row2"></div>
            <!-- Row 3: Z X C V B N M -->
            <div class="key-row" id="row3"></div>
        </div>

        <div class="feedback-area">
            <div class="message" id="feedbackMsg">⌨️ Type the letter...</div>
        </div>
        
        <div class="footer-note">Dubeolsik · press keys QWERTY · Auto-advances when correct · Click any key or play button for sound</div>
    </div>

    <script>
        (function() {
            // Mapping: English letter -> Korean + romanization
            const MAP = {
                // Row 1
                'Q': { kr: 'ㅂ', rom: 'b' },
                'W': { kr: 'ㅈ', rom: 'j' },
                'E': { kr: 'ㄷ', rom: 'd' },
                'R': { kr: 'ㄱ', rom: 'g' },
                'T': { kr: 'ㅅ', rom: 's' },
                'Y': { kr: 'ㅛ', rom: 'yo' },
                'U': { kr: 'ㅕ', rom: 'yeo' },
                'I': { kr: 'ㅑ', rom: 'ya' },
                'O': { kr: 'ㅐ', rom: 'ae' },
                'P': { kr: 'ㅔ', rom: 'e' },
                // Row 2
                'A': { kr: 'ㅁ', rom: 'm' },
                'S': { kr: 'ㄴ', rom: 'n' },
                'D': { kr: 'ㅇ', rom: 'ng' },
                'F': { kr: 'ㄹ', rom: 'r/l' },
                'G': { kr: 'ㅎ', rom: 'h' },
                'H': { kr: 'ㅗ', rom: 'o' },
                'J': { kr: 'ㅓ', rom: 'eo' },
                'K': { kr: 'ㅏ', rom: 'a' },
                'L': { kr: 'ㅣ', rom: 'i' },
                // Row 3
                'Z': { kr: 'ㅋ', rom: 'k' },
                'X': { kr: 'ㅌ', rom: 't' },
                'C': { kr: 'ㅊ', rom: 'ch' },
                'V': { kr: 'ㅍ', rom: 'p' },
                'B': { kr: 'ㅠ', rom: 'yu' },
                'N': { kr: 'ㅜ', rom: 'u' },
                'M': { kr: 'ㅡ', rom: 'eu' }
            };

            // All keys in QWERTY order for random selection
            const ALL_KEYS = [
                'Q','W','E','R','T','Y','U','I','O','P',
                'A','S','D','F','G','H','J','K','L',
                'Z','X','C','V','B','N','M'
            ];

            // Vowels set for color coding
            const VOWELS = new Set(['Y','U','I','O','P','H','J','K','L','B','N','M']);

            // State
            let currentEngKey = 'K';    // default: ㅏ
            let score = 0;
            let hintVisible = true;
            let autoPlayEnabled = true;  // renamed from soundEnabled
            let canAnswer = true;        // prevent double-counting same letter

            // DOM elements
            const currentCharEl = document.getElementById('currentChar');
            const hintTextEl = document.getElementById('hintText');
            const feedbackMsgEl = document.getElementById('feedbackMsg');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const hintToggle = document.getElementById('hintToggle');
            const autoPlayToggle = document.getElementById('autoPlayToggle');
            const playButton = document.getElementById('playButton');
            const row1 = document.getElementById('row1');
            const row2 = document.getElementById('row2');
            const row3 = document.getElementById('row3');

            // ---------- Speech synthesis function ----------
            function speakKorean(text) {
                // This function ALWAYS plays sound regardless of autoPlay setting
                // It's called by manual controls (play button, key clicks)
                
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();
                
                // Create utterance
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ko-KR';
                utterance.rate = 0.7; // Slower for beginners
                utterance.pitch = 1.0;
                
                // Try to find a Korean voice
                const voices = window.speechSynthesis.getVoices();
                const koreanVoice = voices.find(voice => voice.lang === 'ko-KR');
                if (koreanVoice) {
                    utterance.voice = koreanVoice;
                }
                
                window.speechSynthesis.speak(utterance);
            }

            // ---------- Auto-play sound function (respects toggle) ----------
            function autoSpeakKorean(text) {
                // Only plays if autoPlay is enabled
                if (!autoPlayEnabled) return;
                speakKorean(text); // Reuse the main function
            }

            // Pre-load voices (they load asynchronously)
            window.speechSynthesis.getVoices();

            // ---------- Render keyboard by QWERTY rows ----------
            function renderKeyboard() {
                // Row 1: Q W E R T Y U I O P
                const row1Keys = ['Q','W','E','R','T','Y','U','I','O','P'];
                // Row 2: A S D F G H J K L
                const row2Keys = ['A','S','D','F','G','H','J','K','L'];
                // Row 3: Z X C V B N M
                const row3Keys = ['Z','X','C','V','B','N','M'];

                row1.innerHTML = '';
                row2.innerHTML = '';
                row3.innerHTML = '';

                row1Keys.forEach(letter => buildKey(letter, row1));
                row2Keys.forEach(letter => buildKey(letter, row2));
                row3Keys.forEach(letter => buildKey(letter, row3));
            }

            function buildKey(letter, parentRow) {
                const item = MAP[letter];
                if (!item) return;
                const keyDiv = document.createElement('div');
                keyDiv.className = 'key';
                if (VOWELS.has(letter)) keyDiv.classList.add('vowel');
                keyDiv.dataset.letter = letter;
                keyDiv.innerHTML = `
                    <span class="korean">${item.kr}</span>
                    <span class="roman">${item.rom}</span>
                    <span class="eng">${letter}</span>
                `;
                
                // Add click handler to play sound (ALWAYS works, ignores autoPlay)
                keyDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    speakKorean(item.kr); // Manual click - always plays
                });
                
                parentRow.appendChild(keyDiv);
            }

            // ---------- Highlight active key ----------
            function highlightKey(engLetter) {
                document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
                if (!engLetter) return;
                const target = Array.from(document.querySelectorAll('.key')).find(k => k.dataset.letter === engLetter);
                if (target) target.classList.add('active');
            }

            // ---------- Update hint visibility ----------
            function updateHintVisibility() {
                if (hintVisible) {
                    hintTextEl.classList.remove('hidden');
                } else {
                    hintTextEl.classList.add('hidden');
                }
            }

            // ---------- Generate random key (mixed mode always) ----------
            function getRandomKey() {
                return ALL_KEYS[Math.floor(Math.random() * ALL_KEYS.length)];
            }

            // ---------- Set a new character ----------
            function setNewCharacter() {
                const newKey = getRandomKey();
                currentEngKey = newKey;
                const data = MAP[newKey];
                currentCharEl.innerText = data.kr;
                hintTextEl.innerText = `${data.rom} · press "${newKey}"`;
                highlightKey(newKey);
                // Reset answer flag for new letter
                canAnswer = true;
                
                // Auto-play the new character if enabled
                autoSpeakKorean(data.kr);
            }

            // ---------- Handle correct answer ----------
            function handleCorrect() {
                if (!canAnswer) return; // already answered this letter

                score += 1;
                scoreDisplay.innerText = score;
                feedbackMsgEl.innerText = '✅ Correct! +1';
                feedbackMsgEl.style.background = '#1f5f3a';
                
                // Auto-play the correct letter (respects toggle)
                const currentKoreanChar = MAP[currentEngKey].kr;
                autoSpeakKorean(currentKoreanChar);
                
                canAnswer = false;

                // Auto advance to next question after a short delay
                setTimeout(() => {
                    setNewCharacter();
                    // Reset feedback message to neutral
                    feedbackMsgEl.innerText = '⌨️ Type the letter...';
                    feedbackMsgEl.style.background = '#273a4b';
                }, 600); // 600ms delay so user sees the success message
            }

            function handleWrong() {
                if (!canAnswer) return; // already correct, ignore further presses
                feedbackMsgEl.innerText = '❌ Try again';
                feedbackMsgEl.style.background = '#9e2d2d';
                
                // Auto-play the correct letter when wrong (to help learning)
                // This respects the autoPlay toggle
                const currentKoreanChar = MAP[currentEngKey].kr;
                autoSpeakKorean(currentKoreanChar);
            }

            // ---------- Keydown handler ----------
            function onKeyDown(e) {
                const key = e.key.toUpperCase();
                // Ignore modifiers and non-letters
                if (e.altKey || e.ctrlKey || e.metaKey || key.length > 1) return;

                // Check if key exists in map
                if (!MAP[key]) return;

                e.preventDefault();

                // Compare
                if (key === currentEngKey) {
                    handleCorrect();
                } else {
                    handleWrong();
                }

                // Flash the pressed key
                const targetKey = Array.from(document.querySelectorAll('.key')).find(k => k.dataset.letter === key);
                if (targetKey) {
                    targetKey.style.background = '#f5e56b';
                    setTimeout(() => {
                        if (key === currentEngKey) {
                            targetKey.style.background = ''; // active class will handle
                        } else {
                            targetKey.style.background = '';
                        }
                    }, 120);
                }
            }

            // ---------- Event listeners ----------
            window.addEventListener('keydown', onKeyDown);

            // Hint toggle
            hintToggle.addEventListener('change', (e) => {
                hintVisible = e.target.checked;
                updateHintVisibility();
            });

            // AutoPlay toggle
            autoPlayToggle.addEventListener('change', (e) => {
                autoPlayEnabled = e.target.checked;
            });

            // Manual play button - always speaks current character
            playButton.addEventListener('click', () => {
                const currentKoreanChar = MAP[currentEngKey].kr;
                speakKorean(currentKoreanChar); // Always plays regardless of autoPlay
                
                // Brief visual feedback
                playButton.style.background = '#f5e56b';
                setTimeout(() => {
                    playButton.style.background = '#ffd966';
                }, 150);
            });

            // ---------- Initialize ----------
            function init() {
                renderKeyboard();
                setNewCharacter();
                score = 0;
                scoreDisplay.innerText = '0';
                hintVisible = true;
                hintToggle.checked = true;
                autoPlayEnabled = true;
                autoPlayToggle.checked = true;
                updateHintVisibility();
            }

            init();

            // Mobile: prevent zoom on double-tap
            document.addEventListener('touchstart', (e) => {
                if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') return;
            }, { passive: false });

        })();
    </script>
</body>
</html>
