<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Korean Typing Practice · Dubeolsik</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #2b3a4a 0%, #1d2a35 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255,255,255,0.3);
            padding: 24px 20px 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e2a36;
            padding: 8px 16px;
            border-radius: 60px;
            margin-bottom: 16px;
            color: white;
            font-weight: 600;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 4px 8px rgba(0,0,0,0.2);
            gap: 8px;
            flex-wrap: wrap;
        }

        .score-box {
            background: #ffd966;
            color: #1e2a36;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1.4rem;
            letter-spacing: 1px;
            box-shadow: 0 2px 0 #b38f40;
            white-space: nowrap;
        }

        .memo-badge {
            background: #4a627a;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .memo-badge span {
            color: #ffd966;
            font-weight: 500;
        }

        .memo-badge .memo-text {
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #3a4c5e;
            padding: 6px 16px;
            border-radius: 40px;
            flex-wrap: wrap;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #e0e0e0;
        }

        .toggle-item input[type="checkbox"] {
            width: 36px;
            height: 20px;
            appearance: none;
            background: #95a5a6;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            border: 2px solid white;
            transition: 0.1s;
        }

        .toggle-item input[type="checkbox"]:checked {
            background: #2e7d32;
        }

        .toggle-item input[type="checkbox"]::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 0px;
            left: 0px;
            transition: 0.1s;
        }

        .toggle-item input[type="checkbox"]:checked::before {
            left: 16px;
        }

        .character-area {
            background: #eef3f7;
            border-radius: 60px;
            margin: 5px 0 15px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: inset 0 8px 12px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.15);
            border: 3px solid white;
            position: relative;
            height: auto;
            min-height: 90px;
        }

        .korean-char {
            font-size: min(20vw, 7.5rem);
            font-weight: 800;
            line-height: 1;
            color: #1f3a4b;
            text-shadow: 3px 3px 0 #c9dae8;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: text;
            -webkit-user-select: text;
        }

        .input-hint {
            font-size: 1rem;
            color: #4a627a;
            margin-top: 4px;
            font-weight: 500;
            transition: opacity 0.2s;
            user-select: text;
            -webkit-user-select: text;
        }

        .input-hint.hidden {
            opacity: 0;
            visibility: hidden;
            height: 0;
            margin: 0;
        }

        /* Play button for manual sound */
        .play-button {
            position: absolute;
            bottom: -15px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #ffd966;
            border: 4px solid white;
            box-shadow: 0 4px 0 #b38f40, 0 8px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.05s linear;
            z-index: 10;
        }

        .play-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b38f40, 0 8px 15px rgba(0,0,0,0.2);
        }

        .play-button span {
            transform: scale(1.2);
            display: inline-block;
        }

        .keyboard-container {
            background: #d9e2ec;
            border-radius: 30px;
            padding: 20px 12px 15px;
            margin: 5px 0 20px;
            border: 2px solid white;
        }

        /* QWERTY layout rows */
        .key-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .key {
            background: white;
            border-radius: 16px;
            padding: 6px 0;
            min-width: 40px;
            text-align: center;
            font-weight: 700;
            box-shadow: 0 4px 0 #b0bec5, 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #f0f4fa;
            flex: 0 1 auto;
            transition: all 0.05s ease;
            cursor: pointer;
        }

        .key.active {
            background: #f5e56b;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b0bec5;
        }

        .key .korean {
            display: block;
            font-size: 1.2rem;
            color: #0f2a3b;
        }

        .key .roman {
            display: block;
            font-size: 0.65rem;
            color: #5c6f82;
            font-weight: 400;
        }

        .key .eng {
            display: block;
            font-size: 0.65rem;
            color: #aa00aa;
            font-weight: 600;
            text-transform: uppercase;
        }

        .key.vowel .korean {
            color: #b13e3e;
        }

        .feedback-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0 10px;
            gap: 10px;
        }

        .message {
            background: #273a4b;
            padding: 10px 18px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            flex: 1;
            font-size: 0.95rem;
            border-left: 6px solid #ffd966;
            user-select: text;
            -webkit-user-select: text;
        }

        .footer-note {
            text-align: center;
            color: #6c8aa3;
            margin-top: 15px;
            font-size: 0.75rem;
            font-weight: 400;
            user-select: text;
            -webkit-user-select: text;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stats-bar">
            <div class="score-box" id="scoreDisplay">0</div>
            
            <div class="memo-badge" id="memoBadge">
                <span>💭</span>
                <span class="memo-text" id="memoText"></span>
            </div>

            <div class="toggle-group">
                <div class="toggle-item">
                    <span>🔤 Hint</span>
                    <input type="checkbox" id="hintToggle" checked>
                </div>
                <div class="toggle-item">
                    <span>🔊 Auto</span>
                    <input type="checkbox" id="autoPlayToggle" checked>
                </div>
            </div>
        </div>

        <div class="character-area">
            <div class="korean-char" id="currentChar">ㅏ</div>
            <div class="input-hint" id="hintText">a · press "K"</div>
            <!-- Manual play button -->
            <div class="play-button" id="playButton" title="Pronounce this letter">
                <span>🔊</span>
            </div>
        </div>

        <!-- Keyboard in QWERTY layout -->
        <div class="keyboard-container">
            <!-- Row 1: Q W E R T Y U I O P -->
            <div class="key-row" id="row1"></div>
            <!-- Row 2: A S D F G H J K L -->
            <div class="key-row" id="row2"></div>
            <!-- Row 3: Z X C V B N M -->
            <div class="key-row" id="row3"></div>
        </div>

        <div class="feedback-area">
            <div class="message" id="feedbackMsg">⌨️ Type the letter...</div>
        </div>
        
        <div class="footer-note">Dubeolsik · press keys QWERTY · Auto-advances when correct · Memo appears only on error</div>
    </div>

    <script>
        (function() {
            // Mapping: English letter -> Korean + romanization
            const MAP = {
                // Row 1
                'Q': { kr: 'ㅂ', rom: 'b' },
                'W': { kr: 'ㅈ', rom: 'j' },
                'E': { kr: 'ㄷ', rom: 'd' },
                'R': { kr: 'ㄱ', rom: 'g' },
                'T': { kr: 'ㅅ', rom: 's' },
                'Y': { kr: 'ㅛ', rom: 'yo' },
                'U': { kr: 'ㅕ', rom: 'yeo' },
                'I': { kr: 'ㅑ', rom: 'ya' },
                'O': { kr: 'ㅐ', rom: 'ae' },
                'P': { kr: 'ㅔ', rom: 'e' },
                // Row 2
                'A': { kr: 'ㅁ', rom: 'm' },
                'S': { kr: 'ㄴ', rom: 'n' },
                'D': { kr: 'ㅇ', rom: 'ng' },
                'F': { kr: 'ㄹ', rom: 'r/l' },
                'G': { kr: 'ㅎ', rom: 'h' },
                'H': { kr: 'ㅗ', rom: 'o' },
                'J': { kr: 'ㅓ', rom: 'eo' },
                'K': { kr: 'ㅏ', rom: 'a' },
                'L': { kr: 'ㅣ', rom: 'i' },
                // Row 3
                'Z': { kr: 'ㅋ', rom: 'k' },
                'X': { kr: 'ㅌ', rom: 't' },
                'C': { kr: 'ㅊ', rom: 'ch' },
                'V': { kr: 'ㅍ', rom: 'p' },
                'B': { kr: 'ㅠ', rom: 'yu' },
                'N': { kr: 'ㅜ', rom: 'u' },
                'M': { kr: 'ㅡ', rom: 'eu' }
            };

            // All keys in QWERTY order for random selection
            const ALL_KEYS = [
                'Q','W','E','R','T','Y','U','I','O','P',
                'A','S','D','F','G','H','J','K','L',
                'Z','X','C','V','B','N','M'
            ];

            // Vowels set for color coding
            const VOWELS = new Set(['Y','U','I','O','P','H','J','K','L','B','N','M']);

            // State
            let currentEngKey = 'K';    // default: ㅏ
            let previousEngKey = null;   // Track previous key to avoid repetition
            let score = 0;
            let hintVisible = true;
            let autoPlayEnabled = true;
            let canAnswer = true;
            
            // Memo storage: maps Korean character to your custom sentence
            let memoMap = {};

            // DOM elements
            const currentCharEl = document.getElementById('currentChar');
            const hintTextEl = document.getElementById('hintText');
            const feedbackMsgEl = document.getElementById('feedbackMsg');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const hintToggle = document.getElementById('hintToggle');
            const autoPlayToggle = document.getElementById('autoPlayToggle');
            const playButton = document.getElementById('playButton');
            const memoTextEl = document.getElementById('memoText');
            const memoBadge = document.getElementById('memoBadge');
            const row1 = document.getElementById('row1');
            const row2 = document.getElementById('row2');
            const row3 = document.getElementById('row3');

            // ---------- Load KRMemo.txt file with fallbacks (Solution 1) ----------
            async function loadMemoFile() {
                // Try multiple possible paths
                const possiblePaths = [
                    'KRMemo.txt',        // Same folder (local, GitHub)
                    './KRMemo.txt',       // Explicit relative path
                    '/KRMemo.txt'         // Root path (for some servers)
                ];
                
                for (const path of possiblePaths) {
                    try {
                        console.log('Trying path:', path);
                        const response = await fetch(path);
                        if (response.ok) {
                            const text = await response.text();
                            parseMemoText(text);
                            console.log('Successfully loaded from:', path);
                            return;
                        }
                    } catch (e) {
                        console.log('Failed with path:', path);
                    }
                }
                
                // If all fails, use embedded fallback data
                console.log('Using embedded fallback memos');
                useFallbackMemos();
            }

            function parseMemoText(text) {
                const lines = text.split('\n');
                lines.forEach(line => {
                    line = line.trim();
                    if (line && line.includes(':')) {
                        const [koreanChar, memo] = line.split(':').map(s => s.trim());
                        memoMap[koreanChar] = memo;
                    }
                });
            }

            function useFallbackMemos() {
                // Your memos embedded directly in the code
                const fallbackMemos = {
                    'ㅂ': 'boutique',
                    'ㅈ': 'JaW',
                    'ㄷ': 'DEad',
                    'ㄱ': 'Grrrr',
                    'ㅅ': 'Sit',
                    'ㅁ': 'MamA',
                    'ㄴ': 'NoSe; NewS',
                    'ㅇ': 'no gooD O.D.',
                    'ㄹ': 'two leaf',
                    'ㅎ': 'Hug',
                    'ㅋ': 'Kizz',
                    'ㅌ': 'Tax',
                    'ㅊ': 'Chill',
                    'ㅍ': 'Pave',
                    'ㅛ': 'YO-yo',
                    'ㅕ': 'yo You',
                    'ㅑ': 'Ya I',
                    'ㅐ': 'Aero Ho Ho Ho',
                    'ㅔ': 'ape',
                    'ㅗ': 'Oh Oh OH',
                    'ㅓ': 'err John',
                    'ㅏ': 'Ark',
                    'ㅣ': 'Ill',
                    'ㅠ': 'Youtube',
                    'ㅜ': 'tun',
                    'ㅡ': 'umm'
                };
                
                memoMap = fallbackMemos;
            }

            // ---------- Update memo display (cleared on new character) ----------
            function clearMemoDisplay() {
                memoTextEl.innerText = '';
            }

            // ---------- Speech synthesis function ----------
            function speakKorean(text) {
                if (!text) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = text.match(/[ㄱ-ㅎㅏ-ㅣ가-힣]/) ? 'ko-KR' : 'en-US';
                utterance.rate = 0.8;
                utterance.pitch = 1.0;
                
                const voices = window.speechSynthesis.getVoices();
                const targetVoice = voices.find(voice => voice.lang === (text.match(/[ㄱ-ㅎㅏ-ㅣ가-힣]/) ? 'ko-KR' : 'en-US'));
                if (targetVoice) utterance.voice = targetVoice;
                
                window.speechSynthesis.speak(utterance);
            }

            // ---------- Auto-play sound function (respects toggle) ----------
            function autoSpeakKorean(text) {
                if (!autoPlayEnabled) return;
                speakKorean(text);
            }

            // Pre-load voices
            window.speechSynthesis.getVoices();

            // ---------- Render keyboard ----------
            function renderKeyboard() {
                const row1Keys = ['Q','W','E','R','T','Y','U','I','O','P'];
                const row2Keys = ['A','S','D','F','G','H','J','K','L'];
                const row3Keys = ['Z','X','C','V','B','N','M'];

                row1.innerHTML = '';
                row2.innerHTML = '';
                row3.innerHTML = '';

                row1Keys.forEach(letter => buildKey(letter, row1));
                row2Keys.forEach(letter => buildKey(letter, row2));
                row3Keys.forEach(letter => buildKey(letter, row3));
            }

            function buildKey(letter, parentRow) {
                const item = MAP[letter];
                if (!item) return;
                const keyDiv = document.createElement('div');
                keyDiv.className = 'key';
                if (VOWELS.has(letter)) keyDiv.classList.add('vowel');
                keyDiv.dataset.letter = letter;
                keyDiv.innerHTML = `
                    <span class="korean">${item.kr}</span>
                    <span class="roman">${item.rom}</span>
                    <span class="eng">${letter}</span>
                `;
                
                keyDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    speakKorean(item.kr); // Korean sound
                });
                
                parentRow.appendChild(keyDiv);
            }

            // ---------- Highlight active key ----------
            function highlightKey(engLetter) {
                document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
                if (!engLetter) return;
                const target = Array.from(document.querySelectorAll('.key')).find(k => k.dataset.letter === engLetter);
                if (target) target.classList.add('active');
            }

            // ---------- Update hint visibility ----------
            function updateHintVisibility() {
                if (hintVisible) {
                    hintTextEl.classList.remove('hidden');
                } else {
                    hintTextEl.classList.add('hidden');
                }
            }

            // ---------- Generate random key that's different from previous ----------
            function getRandomKey() {
                // Filter out the previous key to avoid repetition
                const availableKeys = previousEngKey 
                    ? ALL_KEYS.filter(key => key !== previousEngKey)
                    : ALL_KEYS;
                
                // If all keys are the same (only one key?), fallback to all keys
                if (availableKeys.length === 0) {
                    return ALL_KEYS[Math.floor(Math.random() * ALL_KEYS.length)];
                }
                
                return availableKeys[Math.floor(Math.random() * availableKeys.length)];
            }

            // ---------- Set a new character (Korean pronunciation plays if Auto Play is ON) ----------
            function setNewCharacter() {
                const newKey = getRandomKey();
                
                // Update previous key before setting new one
                previousEngKey = currentEngKey;
                currentEngKey = newKey;
                
                const data = MAP[newKey];
                currentCharEl.innerText = data.kr;
                hintTextEl.innerText = `${data.rom} · press "${newKey}"`;
                highlightKey(newKey);
                canAnswer = true;
                
                // Clear the memo display - memo only appears on error
                clearMemoDisplay();
                
                // Play Korean pronunciation when new character appears (if Auto Play is ON)
                autoSpeakKorean(data.kr);
            }

            // ---------- Handle correct answer - CLEAR the memo ----------
            function handleCorrect() {
                if (!canAnswer) return;

                score += 1;
                scoreDisplay.innerText = score;
                feedbackMsgEl.innerText = '✅ Correct! +1';
                feedbackMsgEl.style.background = '#1f5f3a';
                
                // Clear the memo display on correct answer
                clearMemoDisplay();
                
                const currentKoreanChar = MAP[currentEngKey].kr;
                autoSpeakKorean(currentKoreanChar);
                
                canAnswer = false;

                setTimeout(() => {
                    setNewCharacter();
                    feedbackMsgEl.innerText = '⌨️ Type the letter...';
                    feedbackMsgEl.style.background = '#273a4b';
                }, 600);
            }

            // ---------- Handle wrong answer - Play Korean, wait 1 sec, then play memo ----------
            function handleWrong() {
                if (!canAnswer) return;
                
                feedbackMsgEl.innerText = '❌ Try again';
                feedbackMsgEl.style.background = '#9e2d2d';
                
                const currentKoreanChar = MAP[currentEngKey].kr;
                
                // 1. Play the Korean pronunciation immediately
                autoSpeakKorean(currentKoreanChar);
                
                // 2. Check if there's a custom memo
                const memo = memoMap[currentKoreanChar];
                if (memo) {
                    // Show memo in the top bar
                    memoTextEl.innerText = memo;
                    
                    // Also show it in feedback temporarily
                    const originalMsg = feedbackMsgEl.innerText;
                    feedbackMsgEl.innerText = `📝 ${memo}`;
                    setTimeout(() => {
                        feedbackMsgEl.innerText = originalMsg;
                    }, 2000);
                    
                    // 3. Wait 1 second, then play memo sound (if Auto Play is ON)
                    if (autoPlayEnabled) {
                        setTimeout(() => {
                            speakKorean(memo);
                        }, 1000); // 1 second pause after Korean sound
                    }
                }
            }

            // ---------- Keydown handler ----------
            function onKeyDown(e) {
                const key = e.key.toUpperCase();
                if (e.altKey || e.ctrlKey || e.metaKey || key.length > 1) return;
                if (!MAP[key]) return;
                e.preventDefault();

                if (key === currentEngKey) {
                    handleCorrect();
                } else {
                    handleWrong();
                }

                const targetKey = Array.from(document.querySelectorAll('.key')).find(k => k.dataset.letter === key);
                if (targetKey) {
                    targetKey.style.background = '#f5e56b';
                    setTimeout(() => {
                        if (key === currentEngKey) {
                            targetKey.style.background = '';
                        } else {
                            targetKey.style.background = '';
                        }
                    }, 120);
                }
            }

            // ---------- Event listeners ----------
            window.addEventListener('keydown', onKeyDown);

            hintToggle.addEventListener('change', (e) => {
                hintVisible = e.target.checked;
                updateHintVisibility();
            });

            autoPlayToggle.addEventListener('change', (e) => {
                autoPlayEnabled = e.target.checked;
            });

            playButton.addEventListener('click', () => {
                const currentKoreanChar = MAP[currentEngKey].kr;
                speakKorean(currentKoreanChar);
                
                // Note: Memo is NOT played here - only on errors with 1 second delay
            });

            // ---------- Initialize ----------
            async function init() {
                renderKeyboard();
                await loadMemoFile(); // This will try paths first, then fallback
                setNewCharacter();
                score = 0;
                scoreDisplay.innerText = '0';
                hintVisible = true;
                hintToggle.checked = true;
                autoPlayEnabled = true;
                autoPlayToggle.checked = true;
                updateHintVisibility();
                clearMemoDisplay(); // Ensure memo is empty at start
            }

            init();

            document.addEventListener('touchstart', (e) => {
                if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') return;
            }, { passive: false });

        })();
    </script>
</body>
</html>
