<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Makes it work on mobile - don't remove this! -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Korean Typing Practice · Dubeolsik</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #2b3a4a 0%, #1d2a35 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        /* ===== MAIN CARD ===== */
        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255,255,255,0.3);
            padding: 24px 20px 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* ===== HEADER: SCORE & MODE ===== */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e2a36;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 24px;
            color: white;
            font-weight: 600;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 4px 8px rgba(0,0,0,0.2);
        }

        .score-box {
            background: #ffd966;
            color: #1e2a36;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1.4rem;
            letter-spacing: 1px;
            box-shadow: 0 2px 0 #b38f40;
        }

        .mode-badge {
            background: #3a4c5e;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mode-badge span {
            color: #a3c6e9;
        }

        /* ===== MAIN CHARACTER DISPLAY ===== */
        .character-area {
            background: #eef3f7;
            border-radius: 100px;
            margin: 10px 0 20px;
            padding: 30px 10px;
            text-align: center;
            box-shadow: inset 0 8px 12px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.15);
            border: 3px solid white;
        }

        .korean-char {
            font-size: min(25vw, 10rem);
            font-weight: 800;
            line-height: 1;
            color: #1f3a4b;
            text-shadow: 3px 3px 0 #c9dae8;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-hint {
            font-size: 1.2rem;
            color: #4a627a;
            margin-top: 8px;
            font-weight: 500;
        }

        /* ===== KEYBOARD VISUALIZATION ===== */
        .keyboard-hint {
            background: #d9e2ec;
            border-radius: 30px;
            padding: 20px 12px 15px;
            margin: 25px 0 20px;
            border: 2px solid white;
        }

        .row-label {
            text-align: center;
            color: #1f3a4b;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .key-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .key {
            background: white;
            border-radius: 16px;
            padding: 8px 0;
            min-width: 44px;
            text-align: center;
            font-weight: 700;
            box-shadow: 0 4px 0 #b0bec5, 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #f0f4fa;
            flex: 0 1 auto;
            transition: all 0.05s ease;
        }

        .key.active {
            background: #f5e56b;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b0bec5;
        }

        .key .korean {
            display: block;
            font-size: 1.3rem;
            color: #0f2a3b;
        }

        .key .roman {
            display: block;
            font-size: 0.7rem;
            color: #5c6f82;
            font-weight: 400;
        }

        .key .eng {
            display: block;
            font-size: 0.7rem;
            color: #aa00aa;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* special for vowel rows (right hand) */
        .key.vowel .korean {
            color: #b13e3e;
        }

        /* ===== FEEDBACK & CONTROLS ===== */
        .feedback-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0 15px;
            gap: 10px;
        }

        .message {
            background: #273a4b;
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            flex: 1;
            font-size: 1rem;
            border-left: 6px solid #ffd966;
        }

        .next-btn {
            background: #ffd966;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 40px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #1e2a36;
            box-shadow: 0 6px 0 #b38f40;
            transition: 0.05s linear;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        .next-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b38f40;
        }

        /* ===== MODE SELECTOR ===== */
        .mode-selector {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            background: #334e66;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            flex: 1 0 auto;
            max-width: 130px;
            box-shadow: 0 4px 0 #1f2e3a;
            transition: 0.05s linear;
            border: 1px solid #7f9eb5;
            cursor: pointer;
        }

        .mode-btn.active {
            background: #ffd966;
            color: #1e2a36;
            box-shadow: 0 4px 0 #b38f40;
            border-color: white;
        }

        .mode-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1f2e3a;
        }

        /* ===== tiny extras ===== */
        .footer-note {
            text-align: center;
            color: #6c8aa3;
            margin-top: 20px;
            font-size: 0.8rem;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- stats -->
        <div class="stats-bar">
            <div class="score-box" id="scoreDisplay">0</div>
            <div class="mode-badge">
                <span>✧</span> 두벌식 <span>✧</span>
            </div>
        </div>

        <!-- main character -->
        <div class="character-area">
            <div class="korean-char" id="currentChar">ㅏ</div>
            <div class="input-hint" id="hintText">press the key</div>
        </div>

        <!-- mini keyboard layout -->
        <div class="keyboard-hint">
            <div class="row-label">왼손 · consonants (left hand)</div>
            <div class="key-row" id="leftRow">
                <!-- JS will fill this -->
            </div>
            <div class="row-label" style="margin-top: 8px;">오른손 · vowels (right hand)</div>
            <div class="key-row" id="rightRow">
                <!-- JS will fill this -->
            </div>
        </div>

        <!-- feedback + next -->
        <div class="feedback-area">
            <div class="message" id="feedbackMsg">⌨️ Type the letter...</div>
            <button class="next-btn" id="nextBtn" aria-label="next">▶</button>
        </div>

        <!-- practice modes -->
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="cons" id="modeCons">자음<br><small>consonants</small></button>
            <button class="mode-btn" data-mode="vowel" id="modeVowel">모음<br><small>vowels</small></button>
            <button class="mode-btn" data-mode="mix" id="modeMix">혼합<br><small>mixed</small></button>
        </div>
        <div class="footer-note">Dubeolsik · press keys QWERTY · 모바일 지원</div>
    </div>

    <script>
        (function() {
            // --------------------------------------------------------------
            // KOREAN MAPPING (English letter -> Korean + romanization)
            // --------------------------------------------------------------
            const MAP = {
                // consonants (left hand)
                'Q': { kr: 'ㅂ', rom: 'b' },
                'W': { kr: 'ㅈ', rom: 'j' },
                'E': { kr: 'ㄷ', rom: 'd' },
                'R': { kr: 'ㄱ', rom: 'g' },
                'T': { kr: 'ㅅ', rom: 's' },
                'A': { kr: 'ㅁ', rom: 'm' },
                'S': { kr: 'ㄴ', rom: 'n' },
                'D': { kr: 'ㅇ', rom: 'ng' },
                'F': { kr: 'ㄹ', rom: 'r/l' },
                'G': { kr: 'ㅎ', rom: 'h' },
                'Z': { kr: 'ㅋ', rom: 'k' },
                'X': { kr: 'ㅌ', rom: 't' },
                'C': { kr: 'ㅊ', rom: 'ch' },
                'V': { kr: 'ㅍ', rom: 'p' },
                // vowels (right hand)
                'Y': { kr: 'ㅛ', rom: 'yo' },
                'U': { kr: 'ㅕ', rom: 'yeo' },
                'I': { kr: 'ㅑ', rom: 'ya' },
                'O': { kr: 'ㅐ', rom: 'ae' },
                'P': { kr: 'ㅔ', rom: 'e' },
                'H': { kr: 'ㅗ', rom: 'o' },
                'J': { kr: 'ㅓ', rom: 'eo' },
                'K': { kr: 'ㅏ', rom: 'a' },
                'L': { kr: 'ㅣ', rom: 'i' },
                'B': { kr: 'ㅠ', rom: 'yu' },
                'N': { kr: 'ㅜ', rom: 'u' },
                'M': { kr: 'ㅡ', rom: 'eu' }
            };

            // separate lists for mode selection
            const CONSONANTS = ['Q','W','E','R','T','A','S','D','F','G','Z','X','C','V'];
            const VOWELS = ['Y','U','I','O','P','H','J','K','L','B','N','M'];

            // current state
            let currentEngKey = 'K';        // default: ㅏ
            let score = 0;
            let mode = 'cons';               // 'cons', 'vowel', 'mix'
            let lastKeyWasCorrect = false;

            // DOM elements
            const currentCharEl = document.getElementById('currentChar');
            const hintTextEl = document.getElementById('hintText');
            const feedbackMsgEl = document.getElementById('feedbackMsg');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const nextBtn = document.getElementById('nextBtn');
            const leftRow = document.getElementById('leftRow');
            const rightRow = document.getElementById('rightRow');
            const modeCons = document.getElementById('modeCons');
            const modeVowel = document.getElementById('modeVowel');
            const modeMix = document.getElementById('modeMix');

            // ---------- helper: render keyboard visualization ----------
            function renderKeyboard() {
                leftRow.innerHTML = '';
                rightRow.innerHTML = '';

                // consonants (left)
                CONSONANTS.forEach(letter => {
                    const item = MAP[letter];
                    const keyDiv = document.createElement('div');
                    keyDiv.className = 'key';
                    keyDiv.dataset.letter = letter;
                    keyDiv.innerHTML = `
                        <span class="korean">${item.kr}</span>
                        <span class="roman">${item.rom}</span>
                        <span class="eng">${letter}</span>
                    `;
                    leftRow.appendChild(keyDiv);
                });

                // vowels (right)
                VOWELS.forEach(letter => {
                    const item = MAP[letter];
                    const keyDiv = document.createElement('div');
                    keyDiv.className = 'key vowel';
                    keyDiv.dataset.letter = letter;
                    keyDiv.innerHTML = `
                        <span class="korean">${item.kr}</span>
                        <span class="roman">${item.rom}</span>
                        <span class="eng">${letter}</span>
                    `;
                    rightRow.appendChild(keyDiv);
                });
            }

            // ---------- highlight active key ----------
            function highlightKey(engLetter) {
                // remove active from all
                document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
                if (!engLetter) return;
                const target = Array.from(document.querySelectorAll('.key')).find(k => k.dataset.letter === engLetter);
                if (target) target.classList.add('active');
            }

            // ---------- generate random key based on mode ----------
            function getRandomKey() {
                if (mode === 'cons') {
                    return CONSONANTS[Math.floor(Math.random() * CONSONANTS.length)];
                } else if (mode === 'vowel') {
                    return VOWELS[Math.floor(Math.random() * VOWELS.length)];
                } else {  // mix
                    const all = [...CONSONANTS, ...VOWELS];
                    return all[Math.floor(Math.random() * all.length)];
                }
            }

            // ---------- set a new character ----------
            function setNewCharacter() {
                const newKey = getRandomKey();
                currentEngKey = newKey;
                const data = MAP[newKey];
                currentCharEl.innerText = data.kr;
                hintTextEl.innerText = `${data.rom} · press "${newKey}"`;
                highlightKey(newKey);
                // reset feedback to neutral (but keep if it's a fresh start)
                feedbackMsgEl.innerText = '⌨️ Type the letter...';
                feedbackMsgEl.style.background = '#273a4b';
                lastKeyWasCorrect = false;
            }

            // ---------- handle correct answer ----------
            function handleCorrect() {
                if (lastKeyWasCorrect) return; // already counted this round

                score += 1;
                scoreDisplay.innerText = score;
                feedbackMsgEl.innerText = '✅ Correct! +1';
                feedbackMsgEl.style.background = '#1f5f3a';
                lastKeyWasCorrect = true;

                // auto move to next after short delay? we'll leave it to user pressing next
                // but we can hint
            }

            function handleWrong() {
                if (lastKeyWasCorrect) return; // if already correct, ignore wrong indicators? but we show wrong flash
                feedbackMsgEl.innerText = '❌ Try again';
                feedbackMsgEl.style.background = '#9e2d2d';
            }

            // ---------- keydown handler ----------
            function onKeyDown(e) {
                // prevent default page scroll etc. but keep typing possible
                const key = e.key.toUpperCase();
                // Ignore if it's a modifier only
                if (e.altKey || e.ctrlKey || e.metaKey || key.length > 1) return;

                // Check if key exists in map
                if (!MAP[key]) return;

                e.preventDefault();  // avoid writing in any input

                // Compare
                if (key === currentEngKey) {
                    handleCorrect();
                } else {
                    handleWrong();
                }

                // briefly flash key (highlight already done)
                const targetKey = Array.from(document.querySelectorAll('.key')).find(k => k.dataset.letter === key);
                if (targetKey) {
                    targetKey.style.background = '#f5e56b';
                    setTimeout(() => {
                        // restore but careful (if it's the current correct key, keep active class)
                        if (key === currentEngKey) {
                            targetKey.style.background = ''; // will be covered by active class
                        } else {
                            targetKey.style.background = '';
                        }
                    }, 120);
                }
            }

            // ---------- mode change ----------
            function setMode(newMode) {
                mode = newMode;
                // update active button
                [modeCons, modeVowel, modeMix].forEach(btn => btn.classList.remove('active'));
                if (newMode === 'cons') modeCons.classList.add('active');
                if (newMode === 'vowel') modeVowel.classList.add('active');
                if (newMode === 'mix') modeMix.classList.add('active');

                // reset score? we keep score
                // generate new character
                setNewCharacter();
            }

            // ---------- event listeners ----------
            window.addEventListener('keydown', onKeyDown);

            nextBtn.addEventListener('click', () => {
                setNewCharacter();
            });

            modeCons.addEventListener('click', () => setMode('cons'));
            modeVowel.addEventListener('click', () => setMode('vowel'));
            modeMix.addEventListener('click', () => setMode('mix'));

            // ---------- init ----------
            function init() {
                renderKeyboard();
                setMode('cons');  // default mode
                // ensure score starts 0
                score = 0;
                scoreDisplay.innerText = '0';
            }

            init();

            // mobile: avoid accidental zoom on double-tap
            document.addEventListener('touchstart', (e) => {
                if (e.target.tagName !== 'BUTTON') return;
                e.preventDefault();  // just to be safe
            }, { passive: false });

        })();
    </script>
</body>
</html>
